<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>OVIR Architecture — two-loop verified inference retrieval</title>
  <desc>Outer loop: domain expert examples + Qwen 35B + DSPy configure the pipeline and precompute verified inferences. Inner loop: DSPy-tuned gemma4 orchestrates COBWEB, FalkorDB, Solr tool calls against pre-verified indexes.</desc>

  <!-- Background -->
  <rect width="900" height="680" fill="#f8f9fa" rx="0"/>

  <!-- OUTER LOOP BAND -->
  <rect x="20" y="20" width="860" height="270" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="36" y="44" font-size="11" fill="#818cf8" font-weight="600" letter-spacing="0.08em">OUTER LOOP — OFFLINE</text>

  <!-- Domain expert examples box -->
  <rect x="40" y="58" width="140" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="110" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Domain Expert</text>
  <text x="110" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Examples</text>
  <text x="110" y="112" text-anchor="middle" font-size="10" fill="#64748b">external case samples</text>

  <!-- Arrow: expert → Qwen -->
  <line x1="180" y1="88" x2="218" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Qwen + DSPy box -->
  <rect x="220" y="58" width="150" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="295" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Qwen 35B</text>
  <text x="295" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">+ DSPy</text>
  <text x="295" y="112" text-anchor="middle" font-size="10" fill="#64748b">reasons over examples</text>

  <!-- Arrow: Qwen → Tool config -->
  <line x1="370" y1="88" x2="408" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tool config box -->
  <rect x="410" y="52" width="155" height="73" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="487" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Tool Config</text>
  <text x="487" y="90" text-anchor="middle" font-size="10" fill="#64748b">GLiNER labels</text>
  <text x="487" y="104" text-anchor="middle" font-size="10" fill="#64748b">FalkorDB schema</text>
  <text x="487" y="118" text-anchor="middle" font-size="10" fill="#64748b">Solr fields · COBWEB k</text>

  <!-- Arrow: Tool config → Pipeline run -->
  <line x1="565" y1="88" x2="603" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pipeline run box -->
  <rect x="605" y="58" width="140" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="675" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Pipeline Run</text>
  <text x="675" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">on Corpus</text>
  <text x="675" y="112" text-anchor="middle" font-size="10" fill="#64748b">GLiNER → embed → index</text>

  <!-- Arrow: Corpus → Precompute -->
  <line x1="675" y1="118" x2="675" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Precompute box -->
  <rect x="605" y="160" width="140" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="675" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Precomputed</text>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Inferences</text>
  <text x="675" y="213" text-anchor="middle" font-size="10" fill="#64748b">Qwen on each chunk</text>

  <!-- Arrow: Precompute → REE -->
  <line x1="605" y1="190" x2="567" y2="190" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- REE box -->
  <rect x="410" y="163" width="155" height="55" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="487" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">REE Verification</text>
  <text x="487" y="201" text-anchor="middle" font-size="10" fill="#64748b">model+prompt→output hash</text>
  <text x="487" y="214" text-anchor="middle" font-size="10" fill="#64748b">receipt stored</text>

  <!-- Arrow: REE → Golden examples -->
  <line x1="410" y1="190" x2="372" y2="190" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Golden examples box -->
  <rect x="220" y="160" width="150" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="295" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Golden Examples</text>
  <text x="295" y="199" text-anchor="middle" font-size="10" fill="#64748b">verified chunk inferences</text>
  <text x="295" y="213" text-anchor="middle" font-size="10" fill="#64748b">DSPy trainset</text>

  <!-- Bridge: golden → DSPy (first segment) -->
  <line x1="295" y1="220" x2="295" y2="275" stroke="#059669" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="310" y="255" font-size="10" fill="#059669" font-weight="600">BootstrapFewShot</text>
  <text x="310" y="268" font-size="10" fill="#059669">trainset → compiled prompts</text>

  <!-- SHARED STORES BAND -->
  <rect x="480" y="230" width="360" height="65" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="660" y="250" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600" letter-spacing="0.06em">SHARED STORES (written offline · read online)</text>
  <text x="506" y="274" font-size="11" fill="#1e293b" font-weight="600">FalkorDB</text>
  <text x="576" y="274" font-size="11" fill="#1e293b" font-weight="600">COBWEB</text>
  <text x="646" y="274" font-size="11" fill="#1e293b" font-weight="600">Solr</text>
  <text x="706" y="274" font-size="11" fill="#1e293b" font-weight="600">REE receipts</text>

  <!-- Write arrow from outer pipeline to stores -->
  <line x1="675" y1="220" x2="675" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Read arrow from stores to inner -->
  <line x1="660" y1="295" x2="660" y2="322" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- INNER LOOP BAND -->
  <rect x="20" y="310" width="860" height="300" rx="10" fill="#f0fdf4" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="36" y="334" font-size="11" fill="#059669" font-weight="600" letter-spacing="0.08em">INNER LOOP — ONLINE (per query)</text>

  <!-- DSPy module box -->
  <rect x="40" y="345" width="150" height="65" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="115" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">DSPy Module</text>
  <text x="115" y="383" text-anchor="middle" font-size="10" fill="#64748b">tuned on golden examples</text>
  <text x="115" y="397" text-anchor="middle" font-size="10" fill="#64748b">query → tool call sequence</text>

  <!-- Arrow: DSPy → COBWEB -->
  <line x1="190" y1="378" x2="228" y2="378" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- COBWEB box -->
  <rect x="230" y="352" width="120" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="290" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">COBWEB</text>
  <text x="290" y="389" text-anchor="middle" font-size="10" fill="#64748b">semantic scope → IDs</text>

  <!-- Arrow: COBWEB → FalkorDB -->
  <line x1="350" y1="378" x2="388" y2="378" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FalkorDB box -->
  <rect x="390" y="352" width="130" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="455" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">FalkorDB</text>
  <text x="455" y="389" text-anchor="middle" font-size="10" fill="#64748b">graph traversal scope</text>

  <!-- Arrow: FalkorDB → Solr -->
  <line x1="520" y1="378" x2="558" y2="378" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Solr box -->
  <rect x="560" y="352" width="140" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="630" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Solr</text>
  <text x="630" y="389" text-anchor="middle" font-size="10" fill="#64748b">fq pre-filter · BM25/KNN</text>

  <!-- Arrow: Solr → gemma4 -->
  <line x1="700" y1="378" x2="738" y2="378" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- gemma4 box -->
  <rect x="740" y="352" width="120" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="800" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">gemma4:e4b</text>
  <text x="800" y="389" text-anchor="middle" font-size="10" fill="#64748b">reads scoped context</text>

  <!-- Sufficiency check -->
  <rect x="630" y="440" width="170" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="715" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Sufficiency Check</text>
  <text x="715" y="476" text-anchor="middle" font-size="10" fill="#64748b">pass → return · fail → escalate</text>

  <!-- Arrow: gemma4 → sufficiency -->
  <line x1="800" y1="404" x2="800" y2="424" stroke="#64748b" stroke-width="1.5"/>
  <line x1="800" y1="424" x2="717" y2="424" stroke="#64748b" stroke-width="1.5"/>
  <line x1="717" y1="424" x2="717" y2="438" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Answer box -->
  <rect x="40" y="440" width="140" height="52" rx="6" fill="#fff" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Answer</text>
  <text x="110" y="476" text-anchor="middle" font-size="10" fill="#64748b">pre-verified context</text>

  <!-- Query box -->
  <rect x="40" y="530" width="140" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="110" y="551" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">User Query</text>
  <text x="110" y="566" text-anchor="middle" font-size="10" fill="#64748b">natural language</text>

  <!-- Arrow: Query → DSPy module -->
  <line x1="110" y1="530" x2="110" y2="412" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Answer arrow back from sufficiency -->
  <line x1="630" y1="466" x2="183" y2="466" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bridge second segment: golden examples → DSPy module -->
  <line x1="295" y1="275" x2="295" y2="344" stroke="#059669" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arr-green)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#059669"/>
    </marker>
  </defs>
</svg>
