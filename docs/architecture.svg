<svg viewBox="0 0 960 860" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>OVIR Architecture — two-loop verified inference retrieval</title>

  <!-- Background -->
  <rect width="960" height="860" fill="#f8f9fa"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- OUTER LOOP BAND                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="920" height="272" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="40" y="44" font-size="11" fill="#818cf8" font-weight="700" letter-spacing="0.08em">OUTER LOOP — OFFLINE (per corpus version)</text>

  <!-- Row 1 -->
  <!-- Expert Examples -->
  <rect x="40" y="57" width="128" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="104" y="80" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Domain Expert</text>
  <text x="104" y="96" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Examples</text>
  <text x="104" y="111" text-anchor="middle" font-size="9.5" fill="#64748b">external case samples</text>

  <line x1="168" y1="88" x2="190" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Qwen + DSPy -->
  <rect x="192" y="57" width="128" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="256" y="80" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Qwen 35B</text>
  <text x="256" y="96" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">+ DSPy</text>
  <text x="256" y="111" text-anchor="middle" font-size="9.5" fill="#64748b">reasons over examples</text>

  <line x1="320" y1="88" x2="342" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Tool Config -->
  <rect x="344" y="50" width="148" height="77" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="418" y="72" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Tool Config</text>
  <text x="418" y="88" text-anchor="middle" font-size="9.5" fill="#64748b">GLiNER labels</text>
  <text x="418" y="101" text-anchor="middle" font-size="9.5" fill="#64748b">FalkorDB schema</text>
  <text x="418" y="114" text-anchor="middle" font-size="9.5" fill="#64748b">Solr fields · COBWEB k</text>

  <line x1="492" y1="88" x2="514" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Pipeline Run -->
  <rect x="516" y="57" width="138" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="585" y="80" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Pipeline Run</text>
  <text x="585" y="96" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">on Corpus</text>
  <text x="585" y="111" text-anchor="middle" font-size="9.5" fill="#64748b">GLiNER → embed → index</text>

  <!-- Pipeline → Precomputed (down) -->
  <line x1="585" y1="119" x2="585" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Row 2 (right-to-left continuation) -->
  <!-- Precomputed -->
  <rect x="516" y="162" width="138" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="585" y="185" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Precomputed</text>
  <text x="585" y="201" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Inferences</text>
  <text x="585" y="216" text-anchor="middle" font-size="9.5" fill="#64748b">Qwen on each chunk</text>

  <line x1="516" y1="193" x2="494" y2="193" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- REE Verification -->
  <rect x="344" y="162" width="148" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="418" y="185" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">REE Verification</text>
  <text x="418" y="201" text-anchor="middle" font-size="9.5" fill="#64748b">model+prompt→output hash</text>
  <text x="418" y="214" text-anchor="middle" font-size="9.5" fill="#64748b">receipt stored</text>

  <line x1="344" y1="193" x2="322" y2="193" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Golden Examples -->
  <rect x="192" y="162" width="128" height="62" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="256" y="185" text-anchor="middle" font-size="11.5" font-weight="600" fill="#059669">Golden Examples</text>
  <text x="256" y="201" text-anchor="middle" font-size="9.5" fill="#64748b">verified chunk inferences</text>
  <text x="256" y="214" text-anchor="middle" font-size="9.5" fill="#64748b">DSPy trainset</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- BRIDGE — 3 labeled channels from outer → inner                     -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Channel 1: Compiled Prompts (from Golden, x=256) -->
  <line x1="256" y1="224" x2="256" y2="402" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <rect x="168" y="293" width="175" height="40" rx="5" fill="#f0fdf4" stroke="#34d399" stroke-width="1"/>
  <text x="255" y="309" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">① Compiled Prompts</text>
  <text x="255" y="323" text-anchor="middle" font-size="9" fill="#059669">DSPy BootstrapFewShot output</text>

  <!-- Channel 2: Tool Configs (from ToolConfig, x=418) -->
  <line x1="418" y1="290" x2="418" y2="402" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
  <rect x="333" y="293" width="170" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="418" y="309" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">② Tool Configs</text>
  <text x="418" y="323" text-anchor="middle" font-size="9" fill="#64748b">schemas · labels · k-values</text>

  <!-- Channel 3: Populated Stores (from Pipeline/Precomputed area, x=660) -->
  <line x1="660" y1="290" x2="660" y2="402" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
  <rect x="555" y="293" width="210" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="660" y="309" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">③ Populated Stores</text>
  <text x="660" y="323" text-anchor="middle" font-size="9" fill="#64748b">FalkorDB · COBWEB · Solr · REE</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- INNER LOOP BAND                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="404" width="920" height="436" rx="10" fill="#f0fdf4" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="40" y="428" font-size="11" fill="#059669" font-weight="700" letter-spacing="0.08em">INNER LOOP — ONLINE (per query)</text>

  <!-- ── Main retrieval chain ───────────────────────────────────────── -->
  <!-- DSPy Module -->
  <rect x="40" y="442" width="148" height="60" rx="6" fill="#fff" stroke="#34d399" stroke-width="1.5"/>
  <text x="114" y="465" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">DSPy Module</text>
  <text x="114" y="481" text-anchor="middle" font-size="9.5" fill="#64748b">compiled prompts loaded</text>
  <text x="114" y="494" text-anchor="middle" font-size="9.5" fill="#64748b">query → tool call sequence</text>

  <line x1="188" y1="472" x2="210" y2="472" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- COBWEB -->
  <rect x="212" y="448" width="112" height="50" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="268" y="469" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">COBWEB</text>
  <text x="268" y="485" text-anchor="middle" font-size="9.5" fill="#64748b">semantic scope → IDs</text>

  <line x1="324" y1="472" x2="346" y2="472" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- FalkorDB -->
  <rect x="348" y="448" width="122" height="50" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="409" y="469" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">FalkorDB</text>
  <text x="409" y="485" text-anchor="middle" font-size="9.5" fill="#64748b">graph traversal scope</text>

  <line x1="470" y1="472" x2="492" y2="472" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Solr -->
  <rect x="494" y="448" width="112" height="50" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="550" y="469" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Solr</text>
  <text x="550" y="485" text-anchor="middle" font-size="9.5" fill="#64748b">fq filter · BM25/KNN</text>

  <line x1="606" y1="472" x2="628" y2="472" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- gemma4:e4b -->
  <rect x="630" y="442" width="140" height="60" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="700" y="465" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">gemma4:e4b</text>
  <text x="700" y="481" text-anchor="middle" font-size="9.5" fill="#64748b">reads pre-verified context</text>
  <text x="700" y="494" text-anchor="middle" font-size="9.5" fill="#64748b">assembles answer</text>

  <!-- gemma4 → Sufficiency (down) -->
  <line x1="700" y1="502" x2="700" y2="528" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Sufficiency Check -->
  <rect x="630" y="530" width="140" height="52" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="700" y="552" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Sufficiency</text>
  <text x="700" y="568" text-anchor="middle" font-size="9.5" fill="#64748b">pass → return · fail → retry</text>

  <!-- Sufficiency → Answer (left) -->
  <line x1="630" y1="556" x2="192" y2="556" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Answer -->
  <rect x="40" y="530" width="150" height="52" rx="6" fill="#fff" stroke="#34d399" stroke-width="1.8"/>
  <text x="115" y="552" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Answer</text>
  <text x="115" y="568" text-anchor="middle" font-size="9.5" fill="#64748b">from pre-verified context</text>

  <!-- User Query (below DSPy Module) -->
  <rect x="40" y="618" width="148" height="50" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="114" y="640" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">User Query</text>
  <text x="114" y="655" text-anchor="middle" font-size="9.5" fill="#64748b">natural language</text>

  <!-- Query → DSPy Module (up) -->
  <line x1="114" y1="618" x2="114" y2="504" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Production closed-loop optimization ─────────────────────────── -->
  <!-- Sub-band label -->
  <rect x="38" y="692" width="882" height="130" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="58" y="712" font-size="10" font-weight="700" fill="#ea580c" letter-spacing="0.07em">PRODUCTION CLOSED LOOP — prompt + tool-order optimization</text>

  <!-- Production Traces box -->
  <rect x="630" y="722" width="145" height="52" rx="6" fill="#fff" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="702" y="743" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Production Traces</text>
  <text x="702" y="758" text-anchor="middle" font-size="9" fill="#a16207">query · answer · feedback</text>

  <!-- Sufficiency → Traces (down) -->
  <line x1="700" y1="582" x2="700" y2="720" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#ao)"/>

  <!-- DSPy Re-optimizer box -->
  <rect x="400" y="722" width="155" height="52" rx="6" fill="#fff" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="477" y="743" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">DSPy Re-optimizer</text>
  <text x="477" y="758" text-anchor="middle" font-size="9" fill="#a16207">BootstrapFewShot on new traces</text>

  <!-- Traces → Optimizer (left) -->
  <line x1="630" y1="748" x2="557" y2="748" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#ao)"/>

  <!-- Optimizer → DSPy Module (loop back: left, then up) -->
  <!-- path: left from Optimizer, then up along left edge, then right to DSPy Module -->
  <polyline points="400,748 245,748 245,702 114,702 114,668" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ao)"/>
  <text x="260" y="742" font-size="9" fill="#ea580c" font-weight="600">updates compiled prompts</text>
  <text x="260" y="754" font-size="9" fill="#ea580c">+ tool call ordering</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- Markers                                                             -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#059669"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ea580c"/>
    </marker>
  </defs>
</svg>
