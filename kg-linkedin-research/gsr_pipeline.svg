<svg viewBox="0 0 600 780" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace" font-size="13">

  <!-- QUESTION BOX -->
  <rect x="160" y="20" width="280" height="62" rx="10" fill="#e0f5f0" stroke="#5bbfa0" stroke-width="2"/>
  <rect x="160" y="20" width="280" height="24" rx="10" fill="#5bbfa0"/>
  <rect x="160" y="32" width="280" height="12" fill="#5bbfa0"/>
  <text x="300" y="37" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Question</text>
  <text x="300" y="60" text-anchor="middle" fill="#1a1a1a" font-size="12">what did <tspan font-weight="bold">james k polk</tspan> do</text>
  <text x="300" y="76" text-anchor="middle" fill="#1a1a1a" font-size="12">before he was president?</text>

  <!-- Arrow down -->
  <line x1="300" y1="82" x2="300" y2="112" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- GSR BOX -->
  <rect x="175" y="112" width="250" height="36" rx="8" fill="#f5a623" stroke="#d4891c" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Generative Subgraph Retriever</text>

  <!-- Arrow + beam search label -->
  <line x1="300" y1="148" x2="300" y2="178" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="316" y="167" fill="#555" font-size="11">Beam Search</text>

  <!-- SUBGRAPH ID BOX -->
  <rect x="80" y="178" width="440" height="92" rx="8" fill="white" stroke="#5bbfa0" stroke-width="2"/>
  <rect x="80" y="178" width="440" height="24" rx="8" fill="#5bbfa0"/>
  <rect x="80" y="190" width="440" height="12" fill="#5bbfa0"/>
  <text x="300" y="195" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Subgraph ID (Relation Chain)</text>
  <text x="100" y="218" fill="#c0392b" font-size="12">office_holder</text>
  <text x="210" y="218" fill="#555" font-size="12"> -- </text>
  <text x="228" y="218" fill="#2980b9" font-size="12">office_position_or_title</text>
  <text x="100" y="238" fill="#1a1a1a" font-size="12">government_positions_held</text>
  <text x="296" y="238" fill="#555" font-size="12"> -- </text>
  <text x="314" y="238" fill="#2980b9" font-size="12">office_position_or_title</text>
  <text x="100" y="258" fill="#1a1a1a" font-size="12">profession</text>

  <!-- Fetch subgraph arrow -->
  <line x1="300" y1="270" x2="300" y2="302" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="180" y="290" fill="#555" font-size="11">Fetch Subgraph</text>

  <!-- Freebase logo text -->
  <rect x="384" y="274" width="86" height="24" rx="4" fill="#fff8e1" stroke="#e0c060" stroke-width="1"/>
  <text x="427" y="291" text-anchor="middle" fill="#e67e22" font-size="13" font-family="serif">≈ Free<tspan font-weight="bold">base</tspan></text>

  <!-- SUBGRAPH BOX -->
  <rect x="60" y="302" width="480" height="178" rx="8" fill="white" stroke="#5bbfa0" stroke-width="2"/>
  <rect x="60" y="302" width="480" height="24" rx="8" fill="#5bbfa0"/>
  <rect x="60" y="314" width="480" height="12" fill="#5bbfa0"/>
  <text x="300" y="319" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Subgraph</text>

  <!-- office_holder label (red) -->
  <text x="185" y="348" text-anchor="middle" fill="#c0392b" font-size="12">office_holder</text>
  <!-- office_position_or_title label (blue) -->
  <text x="415" y="348" text-anchor="middle" fill="#2980b9" font-size="12">office_position_or_title</text>

  <!-- James K. Polk node -->
  <text x="110" y="422" text-anchor="middle" fill="#1a1a1a" font-weight="bold" font-size="13">James K. Polk</text>

  <!-- Intermediate nodes -->
  <text x="295" y="376" text-anchor="middle" fill="#555" font-size="12">m.04j60kc</text>
  <text x="295" y="416" text-anchor="middle" fill="#555" font-size="12">m.04j60kh</text>
  <text x="295" y="456" text-anchor="middle" fill="#555" font-size="12">m.04469y8</text>

  <!-- Right labels -->
  <text x="468" y="376" text-anchor="middle" fill="#1a1a1a" font-size="12">United States</text>
  <text x="468" y="392" text-anchor="middle" fill="#1a1a1a" font-size="12">Representative</text>
  <text x="468" y="446" text-anchor="middle" fill="#1a1a1a" font-size="12">President of the</text>
  <text x="468" y="462" text-anchor="middle" fill="#1a1a1a" font-size="12">United States</text>

  <!-- Red arrows: intermediate nodes → James K. Polk -->
  <line x1="262" y1="372" x2="150" y2="412" stroke="#c0392b" stroke-width="1.5" marker-end="url(#redarr)"/>
  <line x1="262" y1="413" x2="150" y2="418" stroke="#c0392b" stroke-width="1.5" marker-end="url(#redarr)"/>
  <line x1="262" y1="453" x2="150" y2="425" stroke="#c0392b" stroke-width="1.5" marker-end="url(#redarr)"/>

  <!-- Blue arrows: intermediate nodes → right labels -->
  <line x1="328" y1="372" x2="415" y2="382" stroke="#2980b9" stroke-width="1.5" marker-end="url(#bluearr)"/>
  <line x1="328" y1="453" x2="415" y2="450" stroke="#2980b9" stroke-width="1.5" marker-end="url(#bluearr)"/>

  <!-- Arrow down to textualize -->
  <line x1="190" y1="480" x2="190" y2="518" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="503" fill="#555" font-size="11">Textualize</text>

  <!-- LLM READER BOX -->
  <rect x="100" y="518" width="180" height="36" rx="8" fill="#f5a623" stroke="#d4891c" stroke-width="2"/>
  <text x="190" y="541" text-anchor="middle" fill="white" font-weight="bold" font-size="14">LLM Reader</text>

  <!-- Arrow from LLM Reader to prediction -->
  <line x1="280" y1="536" x2="328" y2="536" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="304" y="528" text-anchor="middle" fill="#555" font-size="11">Generate</text>

  <!-- PREDICTION BOX -->
  <rect x="328" y="510" width="210" height="52" rx="8" fill="white" stroke="#5bbfa0" stroke-width="2"/>
  <rect x="328" y="510" width="210" height="22" rx="8" fill="#5bbfa0"/>
  <rect x="328" y="522" width="210" height="10" fill="#5bbfa0"/>
  <text x="433" y="526" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Prediction</text>
  <text x="433" y="550" text-anchor="middle" fill="#1a1a1a" font-size="12">United States Representative</text>

  <!-- Caption -->
  <text x="300" y="608" text-anchor="middle" fill="#1a1a1a" font-size="14" font-family="sans-serif" font-weight="bold">Figure 2: Overall pipeline of proposed RAG framework</text>
  <text x="300" y="628" text-anchor="middle" fill="#1a1a1a" font-size="14" font-family="sans-serif" font-weight="bold">for KGQA task with the Generative Subgraph Retriever.</text>

  <!-- Arrow marker defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="redarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="bluearr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
  </defs>
</svg>
